<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Top half (red) -->
  <path d="M50 5 A45 45 0 0 1 95 50 L5 50 A45 45 0 0 1 50 5 Z" fill="#e53935"/>
  <!-- Bottom half (white) -->
  <path d="M50 95 A45 45 0 0 1 5 50 L95 50 A45 45 0 0 1 50 95 Z" fill="#ffffff"/>
  <!-- Horizontal divider line -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="#212121" stroke-width="4"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#212121" stroke-width="4"/>
  <!-- Center button -->
  <circle cx="50" cy="50" r="13" fill="#ffffff" stroke="#212121" stroke-width="4"/>
  <!-- Inner button dot -->
  <circle cx="50" cy="50" r="6" fill="#bdbdbd"/>
</svg>
